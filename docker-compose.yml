version: "3.9"

services:
  backend:
    build:
      context: ./translation-backend
      dockerfile: Dockerfile
    image: ekselanss/videocheviri-backend:latest
    container_name: videocheviri-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEEPL_API_KEY=${DEEPL_API_KEY:-}
      - LOG_LEVEL=info
      - WHISPER_MODEL=small
      - WORKERS=1
    volumes:
      - whisper-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - videocheviri-net

  nginx:
    image: nginx:1.25-alpine
    container_name: videocheviri-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - videocheviri-net
    profiles:
      - with-nginx

volumes:
  whisper-cache:
    driver: local

networks:
  videocheviri-net:
    driver: bridge
